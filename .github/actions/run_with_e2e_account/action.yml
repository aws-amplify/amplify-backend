name: run_with_e2e_account
description: Runs commands with e2e test account
inputs:
  run:
    description: Script to run
    required: true
  on_retry_command:
    description: Script to run before a retry (e.g. a cleanup script).
    required: false
  shell:
    description: Shell
    required: false
  node_version:
    description: node version used to configure environment with
    required: true
  e2e_test_accounts:
    description: Serialized JSON array of strings with account numbers
    required: true
  aws_region:
    description: AWS region. If not provided random will be selected
    required: false
  link_cli:
    description: Whether should link Gen2 CLI globally
    default: false
  fresh_build:
    description: Whether should build from scratch
    default: false
  cdk-lib-version:
    required: true
  attempt_timeout_minutes:
    description: Timeout for each attempt in minutes
    required: false
    # 40 (was 25): the heavier construct dependency graph on this feature line
    # (@aws-blocks/* + newer aws-cdk-lib constructs) makes the create-amplify
    # install from the local verdaccio proxy legitimately slower. On a cold
    # cache attempt 1 could exceed the 25-min cap and time out; retries then
    # outlive the 1h OIDC session token (ExpiredTokenException). A 40-min
    # attempt lets a cold install finish in one pass within the credential
    # window. Matches the team's ci-timeouts-heavy-construct-install fix.
    default: '40'
  retry_attempts:
    description: Number of retry attempts for the main script
    required: false
    default: '5'
  retry_delay:
    description: Delay between retry attempts in seconds
    required: false
    default: '300'
runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: ./.github/actions/setup_node
      with:
        node-version: ${{ inputs.node_version }}
    - name: Restore Build Cache
      if: inputs.fresh_build != 'true'
      uses: ./.github/actions/restore_build_cache
      with:
        cdk-lib-version: ${{ inputs.cdk-lib-version }}
        node-version: ${{ inputs.node_version }}
    - name: Build With Cache
      if: inputs.fresh_build == 'true'
      uses: ./.github/actions/build_with_cache
      with:
        cdk-lib-version: ${{ inputs.cdk-lib-version }}
        node-version: ${{ inputs.node_version }}
    - name: Link CLI
      if: inputs.link_cli == 'true'
      shell: bash
      run: cd packages/cli && npm link
    - name: Select E2E test account
      uses: ./.github/actions/select_e2e_account
      id: selectE2EAccount
      with:
        e2e_test_accounts: ${{ inputs.e2e_test_accounts }}
    - name: Select region
      id: selectE2ERegion
      shell: bash
      run: |
        if [ -z "${{ inputs.aws_region }}" ]; then
          regions=("us-west-2" "us-east-1" "ca-central-1" "eu-central-1")
          rand=$[$RANDOM % ${#regions[@]}]
          selected_aws_region=${regions[$rand]}
        else
          selected_aws_region="${{ inputs.aws_region }}"
        fi
        echo "Selected AWS Region is $selected_aws_region"
        echo "selected_aws_region=$selected_aws_region" >> "$GITHUB_OUTPUT"
    - name: Configure test tooling credentials
      uses: ./.github/actions/setup_profile
      with:
        role-to-assume: ${{ steps.selectE2EAccount.outputs.e2e_test_tooling_role }}
        aws-region: ${{ steps.selectE2ERegion.outputs.selected_aws_region }}
        profile-name: e2e-tooling
    - name: Configure test execution credentials
      uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # version 4.0.2
      with:
        role-to-assume: ${{ steps.selectE2EAccount.outputs.e2e_execution_role }}
        aws-region: ${{ steps.selectE2ERegion.outputs.selected_aws_region }}
    - name: Run script with retry
      shell: bash
      run: |
        set -e

        # Set default shell if not provided
        SHELL_CMD="${{ inputs.shell }}"
        if [ -z "$SHELL_CMD" ]; then
          SHELL_CMD="bash"
        fi

        # Re-assume the e2e roles using a fresh GitHub OIDC token.
        #
        # configure-aws-credentials runs ONCE before this step, and the e2e
        # roles cap MaxSessionDuration at 1h, so on long multi-attempt runs the
        # session expires mid-retry and every subsequent attempt fails with
        # ExpiredToken/ExpiredTokenException. Since each attempt is bounded by
        # attempt_timeout_minutes (<= the 1h cap), re-assuming both roles at the
        # start of every attempt guarantees each attempt runs on a fresh ~1h
        # credential. This is exactly what configure-aws-credentials does
        # internally (assume-role-with-web-identity), just repeated per attempt.
        #
        # Defensive: any failure here leaves the pre-existing credentials in
        # place and returns 0, so this is never worse than the current behavior.
        refresh_credentials() {
          if [ -z "$ACTIONS_ID_TOKEN_REQUEST_URL" ] || [ -z "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" ]; then
            echo "OIDC request env not present; keeping existing credentials"
            return 0
          fi
          local oidc_token
          oidc_token=$(curl -sS \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com" \
            | jq -r '.value')
          if [ -z "$oidc_token" ] || [ "$oidc_token" = "null" ]; then
            echo "WARN: could not fetch OIDC token; keeping existing credentials"
            return 0
          fi

          # Execution role -> default credential env (used by cdk/ampx deploy).
          local exec_creds
          if exec_creds=$(aws sts assume-role-with-web-identity \
            --role-arn "$E2E_EXECUTION_ROLE_ARN" \
            --role-session-name "gha-e2e-exec-${ATTEMPT}" \
            --web-identity-token "$oidc_token" \
            --duration-seconds 3600 \
            --query 'Credentials' --output json 2>/dev/null); then
            export AWS_ACCESS_KEY_ID=$(echo "$exec_creds" | jq -r '.AccessKeyId')
            export AWS_SECRET_ACCESS_KEY=$(echo "$exec_creds" | jq -r '.SecretAccessKey')
            export AWS_SESSION_TOKEN=$(echo "$exec_creds" | jq -r '.SessionToken')
            echo "Refreshed execution-role credentials for attempt ${ATTEMPT}"
          else
            echo "WARN: execution-role re-assume failed; keeping existing credentials"
          fi

          # Tooling role -> e2e-tooling profile (used by the test's AWS clients).
          local tool_creds
          if tool_creds=$(aws sts assume-role-with-web-identity \
            --role-arn "$E2E_TOOLING_ROLE_ARN" \
            --role-session-name "gha-e2e-tooling-${ATTEMPT}" \
            --web-identity-token "$oidc_token" \
            --duration-seconds 3600 \
            --query 'Credentials' --output json 2>/dev/null); then
            aws configure set aws_access_key_id "$(echo "$tool_creds" | jq -r '.AccessKeyId')" --profile e2e-tooling
            aws configure set aws_secret_access_key "$(echo "$tool_creds" | jq -r '.SecretAccessKey')" --profile e2e-tooling
            aws configure set aws_session_token "$(echo "$tool_creds" | jq -r '.SessionToken')" --profile e2e-tooling
            echo "Refreshed tooling-role credentials for attempt ${ATTEMPT}"
          else
            echo "WARN: tooling-role re-assume failed; keeping existing credentials"
          fi
          return 0
        }

        # Retry logic
        RETRY_ATTEMPTS=${{ inputs.retry_attempts }}
        RETRY_DELAY=${{ inputs.retry_delay }}
        TIMEOUT_MINUTES=${{ inputs.attempt_timeout_minutes }}
        ATTEMPT=1

        # Function to run command with timeout (cross-platform)
        run_with_timeout() {
          local cmd="$1"
          local shell_type="$2"
          local timeout_seconds=$((TIMEOUT_MINUTES * 60))
          
          echo "Running command with timeout of $TIMEOUT_MINUTES minutes ($timeout_seconds seconds)"
          
          # Create a temporary file for the exit code
          local temp_exit_code=$(mktemp)
          
          # Run the command in background
          if [ "$shell_type" = "bash" ]; then
            (bash -c "$cmd"; echo $? > "$temp_exit_code") &
          elif [ "$shell_type" = "pwsh" ]; then
            (pwsh -c "$cmd"; echo $? > "$temp_exit_code") &
          else
            # Default to bash for other shells
            (bash -c "$cmd"; echo $? > "$temp_exit_code") &
          fi
          
          local cmd_pid=$!
          local elapsed=0
          local sleep_interval=5
          
          # Monitor the process
          while [ $elapsed -lt $timeout_seconds ]; do
            if ! kill -0 $cmd_pid 2>/dev/null; then
              # Process has finished
              wait $cmd_pid 2>/dev/null
              local exit_code
              if [ -f "$temp_exit_code" ]; then
                exit_code=$(cat "$temp_exit_code")
                rm -f "$temp_exit_code"
              else
                exit_code=$?
              fi
              return $exit_code
            fi
            
            sleep $sleep_interval
            elapsed=$((elapsed + sleep_interval))
          done
          
          # Timeout reached, kill the process
          echo "Timeout reached, terminating process..."
          kill -TERM $cmd_pid 2>/dev/null
          sleep 2
          kill -KILL $cmd_pid 2>/dev/null
          wait $cmd_pid 2>/dev/null
          rm -f "$temp_exit_code"
          return 124  # Standard timeout exit code
        }

        while [ $ATTEMPT -le $RETRY_ATTEMPTS ]; do
          echo "Attempt $ATTEMPT of $RETRY_ATTEMPTS"

          # Start each attempt with fresh ~1h credentials so a retry never runs
          # on an expired session (the roles cap MaxSessionDuration at 1h).
          refresh_credentials

          if run_with_timeout '${{ inputs.run }}' "$SHELL_CMD"; then
            echo "Script succeeded on attempt $ATTEMPT"
            exit 0
          else
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 124 ]; then
              echo "Script timed out after $TIMEOUT_MINUTES minutes on attempt $ATTEMPT"
            else
              echo "Script failed with exit code $EXIT_CODE on attempt $ATTEMPT"
            fi
          fi
          
          if [ $ATTEMPT -lt $RETRY_ATTEMPTS ]; then
            echo "Retrying in $RETRY_DELAY seconds..."
            sleep $RETRY_DELAY
            # Run on retry command if provided
            if [ -n "${{ inputs.on_retry_command }}" ]; then
              echo "Running on retry command..."
              if ! run_with_timeout '${{ inputs.on_retry_command }}' "$SHELL_CMD"; then
                echo "On retry command failed, but continuing with retry attempt"
              fi
            fi
          else
            echo "Script failed after $RETRY_ATTEMPTS attempts"
            exit 1
          fi
          
          ATTEMPT=$((ATTEMPT + 1))
        done
      env:
        AWS_REGION: ${{ steps.selectE2ERegion.outputs.selected_aws_region }}
        AMPLIFY_BACKEND_TESTS_E2E_EXECUTION_ROLE_ARN: ${{ steps.selectE2EAccount.outputs.e2e_execution_role }}
        # Consumed by refresh_credentials() to re-assume both roles per attempt.
        E2E_EXECUTION_ROLE_ARN: ${{ steps.selectE2EAccount.outputs.e2e_execution_role }}
        E2E_TOOLING_ROLE_ARN: ${{ steps.selectE2EAccount.outputs.e2e_test_tooling_role }}
